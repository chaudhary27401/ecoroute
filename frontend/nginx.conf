server {
    listen 5173;
    server_name localhost;
    root /app/dist;

    # Serve React app
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to order-service (rewrite /api/orders to /orders)
    location /api/orders {
        rewrite ^/api/orders/?(.*) /orders/$1 break;
        proxy_pass http://order-service:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Proxy API requests to driver-service (rewrite /api/drivers to /drivers)
    location /api/drivers {
        rewrite ^/api/drivers/?(.*) /drivers/$1 break;
        proxy_pass http://driver-service:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Cache assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /app/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
